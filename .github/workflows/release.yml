name: Release PaperDF
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}
jobs:
  build:
    name: Build binaries
    strategy:
      matrix:
        os: [windows-latest, ubuntu-20.04, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "requirements.txt"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name PaperDF ^
            --icon=assets\icon.ico ^
            --add-data "assets\icon.png;assets" ^
            pdf_metadata_renamer.py
          powershell -NoProfile -Command "Compress-Archive -Path dist\PaperDF.exe -DestinationPath PaperDF-windows.zip"
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name PaperDF \
            --add-data "assets/icon.png:assets" \
            pdf_metadata_renamer.py
          cd dist
          tar -czf ../PaperDF-linux.tar.gz PaperDF
          cd -
      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --onefile --windowed \
            --name PaperDF \
            --icon=assets/icon.icns \
            --add-data "assets/icon.png:assets" \
            pdf_metadata_renamer.py
          cd dist
          ditto -c -k --sequesterRsrc --keepParent PaperDF.app ../PaperDF-macos.zip
          cd -
      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PaperDF-windows
          path: PaperDF-windows.zip
      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: PaperDF-linux
          path: PaperDF-linux.tar.gz
      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: PaperDF-macos
          path: PaperDF-macos.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true
      - name: SHA256 checksums
        run: |
          cd artifacts
          sha256sum PaperDF-* > SHA256SUMS.txt
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PaperDF-windows.zip
            artifacts/PaperDF-linux.tar.gz
            artifacts/PaperDF-macos.zip
            artifacts/SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
